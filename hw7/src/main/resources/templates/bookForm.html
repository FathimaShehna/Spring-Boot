<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
</head>
<body>

<h2>Add Book</h2>

<form th:action="@{/save-book}" th:object="${book}" method="post">

    Title: <input type="text" th:field="*{title}" required><br><br>

    Author: <input type="text" th:field="*{authorName}" required><br><br>

    Price: <input type="number" step="0.01" th:field="*{price}" required><br><br>

    <button type="submit">Save</button>

</form>

</body>
</html>
