<!DOCTYPE html>
<html>
<head>
    <title>Book List</title>
</head>
<body>

<h2>All Books</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
    </tr>

    <tr th:each="b : ${books}">
        <td th:text="${b.id}"></td>
        <td th:text="${b.title}"></td>
        <td th:text="${b.authorName}"></td>
        <td th:text="${b.price}"></td>
    </tr>

</table>

</body>
</html>
