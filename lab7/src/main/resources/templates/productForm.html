<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
</head>
<body>

<h2>Add Product</h2>

<form th:action="@{/save-product}" th:object="${product}" method="post">

    Name: <input type="text" th:field="*{name}" required><br><br>

    Description: <input type="text" th:field="*{description}" required><br><br>

    Price: <input type="number" step="0.01" th:field="*{price}" required><br><br>

    <button type="submit">Save</button>

</form>

</body>
</html>
