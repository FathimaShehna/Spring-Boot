<!DOCTYPE html>
<html>
<head>
    <title>Add Mobile</title>
</head>
<body>

<h2>Add Mobile Details</h2>

<form th:action="@{/save-mobile}" th:object="${mobile}" method="post">

    Name: <input type="text" th:field="*{name}" required><br><br>

    Brand: <input type="text" th:field="*{brand}" required><br><br>
	
	Type: <input type="text" th:field="*{type}" required><br><br>

    Price: <input type="number" step="0.01" th:field="*{price}" required><br><br>

    <button type="submit">Save</button>

</form>

</body>
</html>
